[workspace]
authors = ["Baptiste PIERRAT <pierrat@emse.fr>"]
channels = ["conda-forge"]
name = "tp-identification"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
start = "jupyter lab"
notebook = "jupyter lab Identification.ipynb"

