[workspace]
authors = ["Baptiste PIERRAT <pierrat@emse.fr>"]
channels = ["conda-forge"]
name = "tp-identification"
platforms = [
  "linux-64", 
  { name = "linux-64-cluster", platform = "linux-64", glibc = "2.17" }
]
version = "0.1.0"

[dependencies]
python = ">=3.10"
fenics-dolfinx = "==0.9.0"
python-gmsh = ">=4.15.2,<5"
matplotlib = ">=3.10.9,<4"
scipy = ">=1.18.0,<2"
jupyterlab = ">=4.6.1,<5"
ipympl = ">=0.10.0,<0.11"
k3d = ">=2.17.0,<3"
notebook = ">=7.6.0,<8"

[pypi-dependencies]
scienceplots = ">=2.2.2, <3"


# --- Cluster Specific Configuration ---

[feature.cluster]
platforms = ["linux-64-cluster"]

[environments]
cluster = ["cluster"]

